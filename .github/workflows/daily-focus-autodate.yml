name: Daily Focus Auto-Date

on:
  schedule:
    # Every day at 05:00 ET (09:00 UTC during EDT, 10:00 UTC during EST)
    # Using 09:00 UTC to guarantee arrival before 07:00 ET year-round
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  update-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Daily Focus date
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python daily_focus_autodate.py
