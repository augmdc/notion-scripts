name: Create Weekly Review Entry

on:
  schedule:
    # Every Sunday at 10:00 AM Eastern (15:00 UTC)
    - cron: "0 15 * * 0"
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  create-entry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Weekly Review entry
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          WEEKLY_REVIEW_DB_ID: ${{ secrets.WEEKLY_REVIEW_DB_ID }}
        run: python create_weekly_review.py
